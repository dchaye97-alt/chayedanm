<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>小六壬占卜</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Serif SC","SimSun",serif;background:#0d0800;color:#f0ddb0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px}
h1{font-size:2rem;letter-spacing:.5em;color:#e8b840;text-shadow:0 0 16px #c8860066;margin-bottom:6px}
.sub{font-size:.8rem;color:#907050;letter-spacing:.3em;margin-bottom:32px}
.card{background:#1c1005;border:1px solid #5a3a10;border-radius:10px;padding:24px;width:100%;max-width:500px;margin-bottom:20px}
.tabs{display:flex;gap:8px;margin-bottom:18px}
.tab{flex:1;padding:8px;background:#0d0800;border:1px solid #5a3a10;border-radius:5px;color:#907050;font-family:inherit;font-size:.82rem;cursor:pointer;transition:all .2s;letter-spacing:.05em}
.tab.on{background:#3a1e00;border-color:#e8b840;color:#e8b840}
label{display:block;font-size:.78rem;color:#907050;margin-bottom:5px}
input,select{width:100%;padding:8px 12px;background:#0d0800;border:1px solid #5a3a10;border-radius:5px;color:#f0ddb0;font-size:.95rem;font-family:inherit;outline:none;margin-bottom:12px}
input:focus,select:focus{border-color:#e8b840}
.row{display:flex;gap:10px}
.col{flex:1}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#6b2e00,#b07000);border:none;border-radius:8px;color:#fff8e8;font-size:1.05rem;font-family:inherit;letter-spacing:.4em;cursor:pointer;margin-top:4px}
.btn:hover{opacity:.88}
.result{display:none;margin-top:20px;width:100%;max-width:500px}
.three{display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:18px}
.gbox{text-align:center;flex:1;padding:14px 8px;background:#0d0800;border-radius:8px;border:1px solid #5a3a10}
.gbox.ji{border-color:#40a060;box-shadow:0 0 10px #40a06030}
.gbox.xiong{border-color:#d04030;box-shadow:0 0 10px #d0403030}
.gpos{font-size:.7rem;color:#907050;margin-bottom:4px}
.gname{font-size:1.5rem;color:#e8b840;font-weight:bold}
.gnature{font-size:.72rem;margin-top:3px;padding:1px 8px;border-radius:3px;display:inline-block}
.nj{background:#1a3a1a;color:#40a060}
.nx{background:#3a1a1a;color:#d04030}
.arrow{color:#5a3a10;font-size:1.2rem;flex-shrink:0}
.judge{padding:12px 16px;background:#0d0800;border:1px solid #5a3a10;border-radius:8px;margin-bottom:14px;font-size:.9rem}
.jlabel{color:#907050;margin-right:8px}
.jval{font-size:1.1rem;font-weight:bold;color:#e8b840}
.section{background:#0d0800;border:1px solid #5a3a10;border-radius:8px;padding:16px;margin-bottom:12px}
.stitle{font-size:.82rem;color:#c8940a;margin-bottom:8px;letter-spacing:.1em}
.stext{font-size:.88rem;line-height:1.9;color:#d0c090}
.info{font-size:.75rem;color:#604020;line-height:1.8;margin-top:8px;padding-top:10px;border-top:1px solid #2a1800}
</style>
</head>
<body>
<h1>小 六 壬</h1>
<p class="sub">大安 · 留连 · 速喜 · 赤口 · 小吉 · 空亡</p>

<div class="card">
  <div class="tabs">
    <button class="tab on" onclick="setM('time',this)">时间起课</button>
    <button class="tab" onclick="setM('manual',this)">手动输入</button>
    <button class="tab" onclick="setM('random',this)">随机起课</button>
  </div>
  <div id="m-time">
    <div class="row">
      <div class="col"><label>月份</label><input type="number" id="t-m" min="1" max="12" placeholder="当前月"/></div>
      <div class="col"><label>日期</label><input type="number" id="t-d" min="1" max="31" placeholder="当前日"/></div>
      <div class="col"><label>时辰</label>
        <select id="t-h">
          <option value="">当前</option>
          <option value="1">子 23–1</option><option value="2">丑 1–3</option>
          <option value="3">寅 3–5</option><option value="4">卯 5–7</option>
          <option value="5">辰 7–9</option><option value="6">巳 9–11</option>
          <option value="7">午 11–13</option><option value="8">未 13–15</option>
          <option value="9">申 15–17</option><option value="10">酉 17–19</option>
          <option value="11">戌 19–21</option><option value="12">亥 21–23</option>
        </select>
      </div>
    </div>
  </div>
  <div id="m-manual" style="display:none">
    <div class="row">
      <div class="col"><label>天课数</label><input type="number" id="mn-t" min="1" placeholder="月数"/></div>
      <div class="col"><label>地课数</label><input type="number" id="mn-d" min="1" placeholder="日数"/></div>
      <div class="col"><label>人课数</label><input type="number" id="mn-r" min="1" placeholder="时辰序"/></div>
    </div>
  </div>
  <div id="m-random" style="display:none;text-align:center;padding:12px 0;color:#a07040;font-size:.9rem">
    心中默想所问之事，点击起课
  </div>
  <button class="btn" onclick="divine()">起 课 问 卦</button>
</div>

<div class="result" id="result">
  <div class="three" id="three"></div>
  <div class="judge" id="judge"></div>
  <div class="section"><div class="stitle">天宫详解（起因）</div><div class="stext" id="d-t"></div></div>
  <div class="section"><div class="stitle">地宫详解（经过）</div><div class="stext" id="d-d"></div></div>
  <div class="section"><div class="stitle">人宫详解（结局）</div><div class="stext" id="d-r"></div></div>
  <div class="section"><div class="stitle">体用关系</div><div class="stext" id="d-ty"></div></div>
  <div class="info" id="info"></div>
</div>

<script>
const G=[
  {name:'大安',nature:'吉',level:'大吉',wx:'木',shen:'青龙',gong:'事业宫·命宫',
   desc:'大安者，诸事安稳，百事大吉。身未动，主仁。宜守不宜动，动则反凶。',
   detail:'问运势：平稳顺遂，宜守不动。问事业：稳固可成，利求官职。问感情：和睦美满，关系融洽。问财运：财源稳固，不宜大投资。问疾病：病势渐安，可望痊愈。问出行：行人在家，出行平安。'},
  {name:'留连',nature:'凶',level:'小凶',wx:'土',shen:'腾蛇',gong:'田宅宫·奴仆宫',
   desc:'留连者，事多迟滞，进退两难。卒未归，主虚。宜耐心等待，切忌急躁。晚上测到有变数。',
   detail:'问运势：低迷拖延，难以速成。问事业：工作拖延，事多纠缠。问感情：多波折忧虑，需沟通。问财运：财运受阻，防因财纠纷。问疾病：脾胃有疾，病情缠绵。问出行：行人迟迟未归，延误多。'},
  {name:'速喜',nature:'吉',level:'中吉',wx:'火',shen:'朱雀',gong:'感情宫·婚姻宫',
   desc:'速喜者，喜讯将至，事事顺心。人来信，主礼。宜速不宜迟，好事不长久，把握时机。',
   detail:'问运势：喜事将至，把握时机。问事业：工作顺利，有嘉奖。问感情：喜事将近，感情升温。问财运：喜财临门，文书之财。问疾病：病情好转，恢复较快。问出行：顺利平安，行人速归。'},
  {name:'赤口',nature:'凶',level:'中凶',wx:'金',shen:'白虎',gong:'疾厄宫·兄弟宫',
   desc:'赤口者，口舌是非，争讼纷起。人在外，主义。宜慎言慎行，远离是非。防车祸意外，防破财纠纷。',
   detail:'问运势：是非多，诸事不利。问事业：工作不顺，防官非。问感情：争执口角，需冷静。问财运：求财不吉，防因财官司。问疾病：气管肺部有疾，防手术。问出行：有阻，防口舌争执意外。'},
  {name:'小吉',nature:'吉',level:'小吉',wx:'水',shen:'玄武',gong:'驿马宫·子女宫',
   desc:'小吉者，诸事小吉，渐入佳境。人在路，主智。循序渐进可成，虽吉力量不大，需自己努力。',
   detail:'问运势：渐好，小有收获，需努力。问事业：工作顺，利外出发展升迁。问感情：顺遂渐好，注意桃花。问财运：流动之财，外出求财吉。问疾病：胆肾有疾，逐步康复。问出行：顺利小有收获，行人平安。'},
  {name:'空亡',nature:'凶',level:'大凶',wx:'土',shen:'勾陈',gong:'福德宫·父母宫',
   desc:'空亡者，诸事落空，徒劳无功。音信稀，主信。宜静待时机，不可强求。凡事先以凶论，再看具体。',
   detail:'问运势：诸事落空，不可强求。问事业：工作落空，官职难得。问感情：感情无果，需认真审视。问财运：财落空，求财不成。问疾病：脾胃有疾，病情难愈。问出行：有阻，或无功而返。'},
];

const WX_ORDER=['木','火','土','金','水'];
function wxIdx(w){return WX_ORDER.indexOf(w)}
function sheng(a,b){const i=wxIdx(a),j=wxIdx(b);return(i+1)%5===j}
function ke(a,b){const i=wxIdx(a),j=wxIdx(b);return(i+2)%5===j}

function tiyong(body,yong){
  const bw=G[body-1].wx, yw=G[yong-1].wx;
  if(sheng(yw,bw)) return '用生体 ★ 大吉：事情发展趋势极好，有外力相助，所求可成。';
  if(ke(bw,yw))    return '体克用 ◎ 小吉：主动努力可得，积极进取则事有所成。';
  if(bw===yw)      return '体用比和 ○ 中吉：阴阳相助则吉，同性相遇则为比劫，需视情况而定。';
  if(sheng(bw,yw)) return '体生用 △ 小凶：有泄耗之象，付出较多，回报有限，如投资需谨慎。';
  if(ke(yw,bw))    return '用克体 ✕ 大凶：事情发展受阻，付出甚多也难成功，宜暂缓。';
  return '关系复杂，需结合具体事项综合判断。';
}

let curMethod='time';
function setM(m,btn){
  curMethod=m;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ['time','manual','random'].forEach(x=>{
    document.getElementById('m-'+x).style.display=x===m?'':'none';
  });
  document.getElementById('result').style.display='none';
}

function hourToShi(h){return h===23||h===0?1:Math.floor(h/2)+1}

function calc(t,d,r){
  const ti=((t-1)%6)+1;
  const di=((ti+d-2)%6)+1;
  const ri=((di+r-2)%6)+1;
  return{t:ti,d:di,r:ri};
}

function divine(){
  const now=new Date();
  let t,d,r,info='';
  if(curMethod==='time'){
    const m=parseInt(document.getElementById('t-m').value)||(now.getMonth()+1);
    const day=parseInt(document.getElementById('t-d').value)||now.getDate();
    const hv=document.getElementById('t-h').value;
    const shi=hv?parseInt(hv):hourToShi(now.getHours());
    t=m;d=day;r=shi;
    info=`起课：${m}月${day}日，第${shi}时辰 → 天课${m}，地课${day}，人课${shi}`;
  }else if(curMethod==='manual'){
    t=parseInt(document.getElementById('mn-t').value);
    d=parseInt(document.getElementById('mn-d').value);
    r=parseInt(document.getElementById('mn-r').value);
    if(!t||!d||!r||t<1||d<1||r<1){alert('请填写三个正整数');return;}
    info=`手动起课：天课${t}，地课${d}，人课${r}`;
  }else{
    t=Math.ceil(Math.random()*100);
    d=Math.ceil(Math.random()*100);
    r=Math.ceil(Math.random()*100);
    info=`随机起课：天${t}，地${d}，人${r}`;
  }
  const{t:ti,d:di,r:ri}=calc(t,d,r);
  const gt=G[ti-1],gd=G[di-1],gr=G[ri-1];

  // 三宫
  const threeEl=document.getElementById('three');
  const box=(g,label)=>`<div class="gbox ${g.nature==='吉'?'ji':'xiong'}">
    <div class="gpos">${label}</div>
    <div class="gname">${g.name}</div>
    <div class="gnature ${g.nature==='吉'?'nj':'nx'}">${g.level}</div>
    <div style="font-size:.7rem;color:#907050;margin-top:3px">${g.shen}</div>
  </div>`;
  threeEl.innerHTML=box(gt,'天宫·起因')+'<div class="arrow">→</div>'+box(gd,'地宫·经过')+'<div class="arrow">→</div>'+box(gr,'人宫·结局');

  // 综合
  const ji=[gt,gd,gr].filter(g=>g.nature==='吉').length;
  const overall=ji===3?'大吉':ji===2?'吉':ji===1?'中平偏凶':'凶';
  const color=ji>=2?'#40a060':ji===1?'#c0a000':'#d04030';
  document.getElementById('judge').innerHTML=
    `<span class="jlabel">综合卦象：</span><span class="jval" style="color:${color}">${overall}</span>
     <span style="font-size:.78rem;color:#907050;margin-left:12px">三吉三凶：${[gt,gd,gr].map(g=>g.name).join(' → ')}</span>`;

  document.getElementById('d-t').innerHTML=`<b>${gt.name}（${gt.gong}·${gt.shen}·${gt.wx}）</b><br>${gt.desc}<br><br>${gt.detail}`;
  document.getElementById('d-d').innerHTML=`<b>${gd.name}（${gd.gong}·${gd.shen}·${gd.wx}）</b><br>${gd.desc}<br><br>${gd.detail}`;
  document.getElementById('d-r').innerHTML=`<b>${gr.name}（${gr.gong}·${gr.shen}·${gr.wx}）</b><br>${gr.desc}<br><br>${gr.detail}`;
  document.getElementById('d-ty').innerHTML=tiyong(ti,ri)+`<br><br>天宫${gt.wx} → 地宫${gd.wx} → 人宫${gr.wx}（体为人宫，用为天宫）`;
  document.getElementById('info').textContent=info+` → 落宫：天第${ti}宫(${gt.name}) 地第${di}宫(${gd.name}) 人第${ri}宫(${gr.name})`;

  const res=document.getElementById('result');
  res.style.display='block';
  res.scrollIntoView({behavior:'smooth',block:'start'});
}
</script>
</body>
</html>
