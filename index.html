<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>小六壬占卜</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Serif SC','SimSun',serif;background:#f5ede0;color:#5a3a1a;min-height:100vh;background-image:radial-gradient(circle at 20% 50%,#f0e0c822 0%,transparent 60%),radial-gradient(circle at 80% 20%,#e8d0b022 0%,transparent 60%)}.hero{text-align:center;padding:48px 16px 32px;background:linear-gradient(180deg,#fff8f0 0%,#f5ede0 100%);border-bottom:2px dashed #d4a574;position:relative}.hero::after{content:'🥚 ✨ 🍵 ✨ 🥚';position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);background:#f5ede0;padding:0 12px;font-size:.85rem;white-space:nowrap}.ht{font-size:2.4rem;letter-spacing:.6em;color:#8b4513;margin-bottom:8px;text-shadow:2px 2px 0 #d4a57444}.hb{display:inline-block;background:#fff3e6;border:2px solid #d4a574;border-radius:20px;padding:4px 20px;font-size:.72rem;color:#a0622a;letter-spacing:.3em;margin-bottom:16px}.hs{font-size:.78rem;color:#c4956a;letter-spacing:.3em;margin-top:8px}.wrap{max-width:560px;margin:0 auto;padding:36px 16px 80px}.card{background:#fff8f0;border:2px solid #e8c9a0;border-radius:18px;padding:24px;margin-bottom:18px;box-shadow:4px 4px 0 #e8c9a0,0 8px 24px #d4a57422;position:relative}.card::before{content:'';position:absolute;top:8px;left:8px;right:8px;bottom:8px;border:1px dashed #e8c9a044;border-radius:12px;pointer-events:none}.ct{font-size:.78rem;color:#a0622a;letter-spacing:.2em;margin-bottom:16px;padding-bottom:10px;border-bottom:2px dotted #e8c9a0;display:flex;align-items:center;gap:6px}.ct::before{content:'🌿';font-size:.9rem}.qw{position:relative;margin-bottom:20px}.ql{position:absolute;top:-10px;left:14px;background:#fff8f0;padding:0 8px;font-size:.7rem;color:#c4956a;border-radius:4px}textarea{width:100%;padding:13px 15px;background:#fffbf6;border:2px solid #e8c9a0;border-radius:12px;color:#5a3a1a;font-size:.92rem;font-family:inherit;outline:none;resize:none;min-height:58px;line-height:1.7;transition:border-color .2s}textarea::placeholder{color:#c4a882}textarea:focus{border-color:#c4956a;box-shadow:0 0 0 3px #d4a57422}.tabs{display:flex;gap:6px;background:#f5ede0;border-radius:12px;padding:5px;margin-bottom:18px}.tb{flex:1;padding:9px 4px;background:transparent;border:none;border-radius:9px;color:#c4956a;font-family:inherit;font-size:.78rem;cursor:pointer;letter-spacing:.05em;transition:all .2s}.tb.on{background:#fff8f0;color:#8b4513;box-shadow:2px 2px 0 #e8c9a0;font-weight:bold}.fr{display:flex;gap:10px}.fc{flex:1}.fl{display:block;font-size:.7rem;color:#c4956a;margin-bottom:5px}input,select{width:100%;padding:9px 11px;background:#fffbf6;border:2px solid #e8c9a0;border-radius:10px;color:#5a3a1a;font-size:.88rem;font-family:inherit;outline:none;transition:border-color .2s}input:focus,select:focus{border-color:#c4956a}select option{background:#fff8f0}.rh{text-align:center;padding:16px 0;color:#c4956a;font-size:.88rem;line-height:2}.go{width:100%;padding:14px;margin-top:14px;background:linear-gradient(135deg,#c4956a,#8b4513);border:none;border-radius:12px;color:#fff8f0;font-size:1rem;font-family:inherit;letter-spacing:.4em;cursor:pointer;box-shadow:3px 3px 0 #8b451344;transition:all .2s}.go:hover{transform:translateY(-1px);box-shadow:4px 5px 0 #8b451344}.go:active{transform:translateY(1px);box-shadow:1px 1px 0 #8b451344}.result{display:none}.qe{padding:12px 16px;background:#fff3e6;border-left:4px solid #c4956a;border-radius:0 12px 12px 0;margin-bottom:18px;font-size:.86rem;color:#7a4a20;line-height:1.8}.qel{font-size:.7rem;color:#c4956a;margin-bottom:3px}.sg{display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:18px}.gb{flex:1;text-align:center;padding:18px 8px;background:#fff8f0;border-radius:14px;border:2px solid #e8c9a0;box-shadow:3px 3px 0 #e8c9a0;transition:all .2s}.gb.ji{border-color:#7ab87a;box-shadow:3px 3px 0 #7ab87a44;background:#f0fff0}.gb.xi{border-color:#d4806a;box-shadow:3px 3px 0 #d4806a44;background:#fff5f3}.gp{font-size:.65rem;color:#c4956a;margin-bottom:6px;letter-spacing:.1em}.gn{font-size:1.6rem;font-weight:bold;color:#8b4513;margin-bottom:4px}.gt{font-size:.68rem;padding:2px 10px;border-radius:10px;display:inline-block;margin-bottom:4px}.tji{background:#e0f5e0;color:#3a8a3a;border:1px solid #7ab87a}.txi{background:#fde8e4;color:#c04030;border:1px solid #d4806a}.gs{font-size:.68rem;color:#c4956a}.ar{color:#d4a574;font-size:1.4rem;flex-shrink:0}.jb{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px 18px;background:#fff8f0;border:2px solid #e8c9a0;border-radius:14px;margin-bottom:14px;box-shadow:3px 3px 0 #e8c9a0}.jl{font-size:.8rem;color:#c4956a}.jv{font-size:1.1rem;font-weight:bold}.dc{background:#fff8f0;border:2px solid #e8c9a0;border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:3px 3px 0 #e8c9a0}.dh{width:100%;padding:12px 16px;background:transparent;border:none;color:#7a4a20;font-family:inherit;font-size:.86rem;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:background .2s}.dh:hover{background:#fff3e6}.dh.on{color:#8b4513;font-weight:bold;border-bottom:2px dotted #e8c9a0}.di{font-size:.7rem;color:#c4956a;transition:transform .2s}.dh.on .di{transform:rotate(180deg)}.db{display:none;padding:16px;font-size:.84rem;line-height:2;color:#7a4a20;background:#fffbf6}.db.on{display:block}.db b{color:#8b4513}.kw{display:inline-block;padding:2px 10px;background:#fff3e6;border:1px solid #e8c9a0;border-radius:10px;font-size:.7rem;color:#a0622a;margin:0 4px 6px 0}.ty{padding:14px 16px;background:#fff8f0;border:2px solid #e8c9a0;border-radius:14px;margin-bottom:10px;font-size:.86rem;line-height:1.9;color:#7a4a20;box-shadow:3px 3px 0 #e8c9a0}.ty b{color:#8b4513}.ci{font-size:.7rem;color:#c4a882;line-height:1.8;margin-top:12px;padding-top:10px;border-top:2px dotted #e8c9a0;text-align:center}.footer{text-align:center;padding:20px;font-size:.75rem;color:#c4a882;letter-spacing:.2em}</style></head><body>
<div class="hero">
<div class="hb">道传 · 小六壬</div>
<div class="ht">小 六 壬</div>
<div class="hs">大安 · 留连 · 速喜 · 赤口 · 小吉 · 空亡</div>
</div>
<div class="wrap">
<div class="card">
<div class="ct">所问之事</div>
<div class="qw"><div class="ql">🌸 心中所问</div><textarea id="qi" placeholder="请写下您想占问的事情，如：近期求职是否顺利？" rows="2"></textarea></div>
<div class="ct">起课方式</div>
<div class="tabs">
<button class="tb on" id="tb-time" onclick="setM('time')">🕐 以时间起课</button>
<button class="tb" id="tb-manual" onclick="setM('manual')">✍️ 手动输入</button>
<button class="tb" id="tb-random" onclick="setM('random')">🎲 随机起课</button>
</div>
<div id="m-time"><div class="fr">
<div class="fc"><label class="fl">月份（1–12）</label><input type="number" id="tm" min="1" max="12" placeholder="当前月"/></div>
<div class="fc"><label class="fl">日期（1–31）</label><input type="number" id="td" min="1" max="31" placeholder="当前日"/></div>
<div class="fc"><label class="fl">时辰</label><select id="th"><option value="">当前时辰</option><option value="1">子 23–1时</option><option value="2">丑 1–3时</option><option value="3">寅 3–5时</option><option value="4">卯 5–7时</option><option value="5">辰 7–9时</option><option value="6">巳 9–11时</option><option value="7">午 11–13时</option><option value="8">未 13–15时</option><option value="9">申 15–17时</option><option value="10">酉 17–19时</option><option value="11">戌 19–21时</option><option value="12">亥 21–23时</option></select></div>
</div></div>
<div id="m-manual" style="display:none"><div class="fr">
<div class="fc"><label class="fl">天课数</label><input type="number" id="mt" min="1" placeholder="月数"/></div>
<div class="fc"><label class="fl">地课数</label><input type="number" id="md" min="1" placeholder="日数"/></div>
<div class="fc"><label class="fl">人课数</label><input type="number" id="mr" min="1" placeholder="时辰序"/></div>
</div></div>
<div id="m-random" style="display:none"><div class="rh">🍵 静心凝神，意念所问之事<br/><span style="font-size:.76rem;color:#d4a574">天机自现，随缘而起 🌿</span></div></div>
<button class="go" onclick="divine()">🔮 起 课 问 卦</button>
</div>
<div class="result" id="result">
<div class="qe" id="qe" style="display:none"><div class="qel">🌸 所占之事</div><div id="qet"></div></div>
<div class="sg" id="sg"></div>
<div class="jb" id="jb"></div>
<div class="dc"><button class="dh on" onclick="tog(this)"><span>🌱 天宫详解 · 事之起因</span><span class="di">▼</span></button><div class="db on" id="dt"></div></div>
<div class="dc"><button class="dh on" onclick="tog(this)"><span>🌿 地宫详解 · 事之经过</span><span class="di">▼</span></button><div class="db on" id="dd"></div></div>
<div class="dc"><button class="dh on" onclick="tog(this)"><span>🍂 人宫详解 · 事之结局</span><span class="di">▼</span></button><div class="db on" id="dr"></div></div>
<div class="ty" id="dty"></div>
<div class="ci" id="ci"></div>
</div></div>
<div class="footer">🥚 茶叶蛋占卜小铺 · 仅供娱乐参考 🥚</div>
<script>
var G=[
{name:'大安',nature:'吉',level:'大吉',wx:'木',shen:'青龙',kw:['安稳','顺遂','如意','静守'],desc:'大安者，诸事安稳，百事大吉。身未动，主仁。宜守不宜动，动则反凶。为事业宫，亦为命宫，主工作、学业、官职、婚事。',dt:{'问运势':'平稳顺遂，宜守不动，循规蹈矩则吉。','问事业':'事业稳固，官职可求，利求学，工作稳定。','问感情':'感情和睦，婚姻美满，关系融洽，宜稳不宜变。','问财运':'财源稳固，求稳财，不宜大投资冒险。','问疾病':'病势渐安，身体健康，可望痊愈。','问出行':'出行平安，行人在家未动，宜近不宜远。','问寻人':'行人在家，未曾出行，可安心。'}},
{name:'留连',nature:'凶',level:'小凶',wx:'土',shen:'腾蛇',kw:['迟滞','拖延','纠缠','暗昧'],desc:'留连者，事多迟滞，进退两难。卒未归，主虚。宜耐心等待，切忌急躁。晚上测到留连，凶中有变数，事情虽凶但尚有转机。',dt:{'问运势':'运势低迷，诸事拖延，难以速成，需耐心。','问事业':'工作拖延，事多纠缠，工作不稳定，防小人。','问感情':'感情有忧，多波折，需多沟通，防第三者。','问财运':'财运受阻，钱财难聚，防因财起纠纷。','问疾病':'脾胃有疾，病情缠绵，慢性久病，需调养。','问出行':'出行多延误，行人迟迟未归，音讯难通。','问寻人':'寻人在外，问不得归，需耐心等候。'}},
{name:'速喜',nature:'吉',level:'中吉',wx:'火',shen:'朱雀',kw:['喜讯','速成','热情','把握时机'],desc:'速喜者，喜讯将至，事事顺心。人来信，主礼。宜速不宜迟，把握时机则事半功倍。好事虽来但不长久，需及时行动。',dt:{'问运势':'喜事将至，运势开启，把握当下时机最重要。','问事业':'工作顺利，有嘉奖，利求职求学，速战速决。','问感情':'喜事将近，感情升温，婚姻有望，宜速不宜拖。','问财运':'喜财临门，有意外之财，文书合同之财。','问疾病':'病情好转，心脑血管需注意，恢复较快。','问出行':'出行顺利，一路平安，行人即将归来。','问寻人':'有口信，行人速归，消息将至。'}},
{name:'赤口',nature:'凶',level:'中凶',wx:'金',shen:'白虎',kw:['口舌','争执','官司','伤灾'],desc:'赤口者，口舌是非，争讼纷起。人在外，主义。宜慎言慎行，远离是非之地。出行防车祸意外，生意防破财纠纷。',dt:{'问运势':'运势差，是非多，诸事不利，宜低调行事。','问事业':'工作不顺，事业受阻，防官非灾事，防小人。','问感情':'感情有争执口角，需冷静处理，防第三者挑拨。','问财运':'求财不吉，防因财起官司，有破财之象。','问疾病':'气管肺部有疾，防手术伤灾，需谨慎用药。','问出行':'出行有阻，防口舌争执，防意外事故。','问寻人':'行人途中有阻，或有争执是非，消息难通。'}},
{name:'小吉',nature:'吉',level:'小吉',wx:'水',shen:'玄武',kw:['小有所得','出行','智慧','循序渐进'],desc:'小吉者，诸事小吉，渐入佳境。人在路，主智。循序渐进则终有所成，虽吉但力量不大，需自己加倍努力方可有更大收获。',dt:{'问运势':'运势渐好，小有收获，需自己努力方可成。','问事业':'工作顺利，利外出发展，有升迁之机。','问感情':'感情顺遂渐好，注意桃花，感情需珍惜。','问财运':'流动之财，外出求财吉顺，付出多回报少。','问疾病':'胆肾有疾，病情趋稳，逐步康复，需坚持。','问出行':'出行顺利，小有收获，行人平安在路上。','问寻人':'行人在路上，不日将归，可安心等候。'}},
{name:'空亡',nature:'凶',level:'大凶',wx:'土',shen:'勾陈',kw:['落空','无果','虚耗','不可强求'],desc:'空亡者，诸事落空，徒劳无功。音信稀，主信。宜静待时机，不可强求。凡所测之事，首先以凶论，再看具体表现，非完全大凶。',dt:{'问运势':'诸事落空，不可强求，静待时机转变。','问事业':'工作落空，官职难得，谋事无望，暂缓为宜。','问感情':'感情无果，有隐患，需认真审视感情真实性。','问财运':'财落空，求财不成，投入难有回报，防因财惹祸。','问疾病':'脾胃有疾，病情难愈，需多方调治，防精神问题。','问出行':'出行有阻，或无功而返，行人消息全无。','问寻人':'行人消息全无，或有变故，难以寻得。'}}
];
var WX=['木','火','土','金','水'];
function sh(a,b){return(WX.indexOf(a)+1)%5===WX.indexOf(b)}
function ke(a,b){return(WX.indexOf(a)+2)%5===WX.indexOf(b)}
function ty(ti,ri){var b=G[ri-1].wx,y=G[ti-1].wx;if(sh(y,b))return'<b>用生体 ★ 大吉</b> — 事情发展极好，有外力相助，所求可成。';if(ke(b,y))return'<b>体克用 ◎ 小吉</b> — 主动努力可得，积极进取则事有所成。';if(b===y)return'<b>体用比和 ○ 中吉</b> — 阴阳相助则吉，同性相遇为比劫，需视情况定。';if(sh(b,y))return'<b>体生用 △ 小凶</b> — 有泄耗之象，付出较多，回报有限，需谨慎。';if(ke(y,b))return'<b>用克体 ✕ 大凶</b> — 事情发展受阻，付出甚多也难成功，宜暂缓。';return'关系复杂，需结合具体事项综合判断。';}
function calc(t,d,r){var ti=((t-1)%6)+1,di=((ti+d-2)%6)+1,ri=((di+r-2)%6)+1;return{t:ti,d:di,r:ri};}
function toS(h){return(h===23||h===0)?1:Math.floor(h/2)+1;}
var cM='time';
function setM(m){cM=m;['time','manual','random'].forEach(function(x){document.getElementById('m-'+x).style.display=(x===m)?'':'none';var b=document.getElementById('tb-'+x);b.className='tb'+(x===m?' on':'');});document.getElementById('result').style.display='none';}
function tog(btn){btn.classList.toggle('on');btn.nextElementSibling.classList.toggle('on');}
function mkD(g){var kws=g.kw.map(function(k){return'<span class="kw">'+k+'</span>';}).join('');var rows=Object.keys(g.dt).map(function(k){return'<b>'+k+'</b>：'+g.dt[k]+'<br/>';}).join('');return kws+'<br/>'+g.desc+'<br/><br/>'+rows;}
function divine(){
var now=new Date(),t,d,r,info='';
if(cM==='time'){var m=parseInt(document.getElementById('tm').value)||(now.getMonth()+1),dy=parseInt(document.getElementById('td').value)||now.getDate(),hv=document.getElementById('th').value,shi=hv?parseInt(hv):toS(now.getHours());t=m;d=dy;r=shi;info=m+'月'+dy+'日第'+shi+'时辰';}
else if(cM==='manual'){t=parseInt(document.getElementById('mt').value);d=parseInt(document.getElementById('md').value);r=parseInt(document.getElementById('mr').value);if(!t||!d||!r||t<1||d<1||r<1){alert('请填写三个正整数');return;}info='手动：天'+t+' 地'+d+' 人'+r;}
else{t=Math.ceil(Math.random()*100);d=Math.ceil(Math.random()*100);r=Math.ceil(Math.random()*100);info='随机：天'+t+' 地'+d+' 人'+r;}
var res=calc(t,d,r),ti=res.t,di=res.d,ri=res.r,gt=G[ti-1],gd=G[di-1],gr=G[ri-1];
var qv=document.getElementById('qi').value.trim(),qe=document.getElementById('qe');
if(qv){document.getElementById('qet').textContent=qv;qe.style.display='block';}else{qe.style.display='none';}
function gH(g,l){var c=g.nature==='吉'?'ji':'xi',tc=g.nature==='吉'?'tji':'txi';return'<div class="gb '+c+'"><div class="gp">'+l+'</div><div class="gn">'+g.name+'</div><span class="gt '+tc+'">'+g.level+'</span><div class="gs">'+g.shen+'</div></div>';}
document.getElementById('sg').innerHTML=gH(gt,'天宫·起因')+'<div class="ar">→</div>'+gH(gd,'地宫·经过')+'<div class="ar">→</div>'+gH(gr,'人宫·结局');
var ji=[gt,gd,gr].filter(function(g){return g.nature==='吉';}).length,ov=ji===3?'大吉 🎉':ji===2?'吉 🌸':ji===1?'中平偏凶 🍂':'凶 ⚡',col=ji>=2?'#3a8a3a':ji===1?'#a07020':'#c04030';
document.getElementById('jb').innerHTML='<span class="jl">综合卦象：</span><span class="jv" style="color:'+col+'">'+ov+'</span><span style="font-size:.76rem;color:#c4956a;margin-left:auto">'+gt.name+'→'+gd.name+'→'+gr.name+'</span>';
document.getElementById('dt').innerHTML=mkD(gt);
document.getElementById('dd').innerHTML=mkD(gd);
document.getElementById('dr').innerHTML=mkD(gr);
document.getElementById('dty').innerHTML='<b>🍵 体用关系</b>（天宫为用，人宫为体）：'+ty(ti,ri);
document.getElementById('ci').textContent='🌿 '+info+' → 天:'+gt.name+' 地:'+gd.name+' 人:'+gr.name;
var el=document.getElementById('result');el.style.display='block';setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'start'});},100);}
</script></body></html>
